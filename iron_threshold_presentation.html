<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPERATION IRON THRESHOLD</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #030508;
  --deep: #07090f;
  --surface: #0c1018;
  --indopacom: #a07cf4;
  --orange: #ff6b35;
  --amber: #f0a830;
  --red: #ef4444;
  --green: #22c55e;
  --white: #f0f4ff;
  --muted: #4a5270;
  --mono: 'Share Tech Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
  --body: 'Barlow', sans-serif;
  --cond: 'Barlow Condensed', sans-serif;
}

html, body {
  width: 100%; height: 100%;
  background: var(--black);
  color: var(--white);
  font-family: var(--body);
  overflow: hidden;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
.cursor {
  position: fixed; width: 6px; height: 6px;
  background: var(--indopacom); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.1s;
  mix-blend-mode: screen;
}

/* ── SCANLINE OVERLAY ── */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9000;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
}

/* ── NOISE TEXTURE ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 8999;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* ── SLIDE CONTAINER ── */
#stage {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
}

.slide {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.05s;
}
.slide.active { opacity: 1; pointer-events: all; }

/* ── PROGRESS BAR ── */
#progress {
  position: fixed; top: 0; left: 0; height: 2px;
  background: var(--indopacom);
  transition: width 0.4s ease;
  z-index: 9001;
  box-shadow: 0 0 8px var(--indopacom);
}

/* ── NAV HINT ── */
#nav-hint {
  position: fixed; bottom: 28px; right: 32px;
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  letter-spacing: 0.1em; z-index: 9001;
  display: flex; align-items: center; gap: 12px;
}
#slide-counter { color: var(--indopacom); }
.nav-key {
  border: 0.5px solid var(--muted); padding: 3px 7px; border-radius: 3px;
  font-size: 9px; color: var(--muted);
}

/* ── CLASSIFICATION STRIP ── */
.classif {
  position: fixed; top: 0; left: 0; right: 0;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; text-align: center;
  padding: 6px; background: rgba(240,168,48,0.08);
  border-bottom: 0.5px solid rgba(240,168,48,0.2);
  color: rgba(240,168,48,0.6); z-index: 9001;
}

/* ══════════════════════════════════════════════════════════
   SLIDE TYPES
══════════════════════════════════════════════════════════ */

/* ── TITLE SLIDE ── */
.s-title {
  background: var(--black);
  flex-direction: column;
  text-align: center;
  padding: 60px 80px;
}
.s-title .pre-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.25em;
  text-transform: uppercase; color: var(--amber); margin-bottom: 32px;
  opacity: 0; animation: fadeUp 0.6s 0.3s forwards;
}
.s-title h1 {
  font-family: var(--display); font-size: clamp(72px, 10vw, 140px);
  letter-spacing: 0.06em; line-height: 0.9;
  color: var(--white);
  opacity: 0; animation: fadeUp 0.7s 0.6s forwards;
}
.s-title h1 span { color: var(--indopacom); }
.s-title .subtitle {
  font-family: var(--cond); font-size: clamp(14px, 2vw, 20px);
  font-weight: 300; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--muted); margin-top: 20px;
  opacity: 0; animation: fadeUp 0.6s 0.9s forwards;
}
.title-line {
  width: 0; height: 1px; background: var(--indopacom);
  margin: 28px auto; animation: expandW 0.8s 1.2s forwards;
  box-shadow: 0 0 12px var(--indopacom);
}
.s-title .meta-grid {
  display: flex; gap: 48px; margin-top: 32px; justify-content: center; flex-wrap: wrap;
  opacity: 0; animation: fadeUp 0.6s 1.5s forwards;
}
.meta-item { text-align: left; }
.meta-label { font-family: var(--mono); font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 4px; }
.meta-value { font-family: var(--cond); font-size: 14px; font-weight: 600; color: var(--white); }

/* ── GRID BG for title ── */
.grid-bg {
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(160,124,244,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(160,124,244,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
}
.glow-orb {
  position: absolute; border-radius: 50%; pointer-events: none; filter: blur(120px);
}

/* ── SECTION HEADER SLIDE ── */
.s-phase {
  flex-direction: column; text-align: center; padding: 60px;
  position: relative; overflow: hidden;
}
.s-phase .phase-num-bg {
  position: absolute; font-family: var(--display);
  font-size: clamp(300px, 40vw, 500px);
  color: rgba(255,255,255,0.015);
  line-height: 1; pointer-events: none;
  letter-spacing: -0.05em;
}
.s-phase .phase-badge-big {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; padding: 6px 16px;
  border-radius: 2px; margin-bottom: 24px;
  opacity: 0; animation: fadeUp 0.5s 0.2s forwards;
}
.s-phase h2 {
  font-family: var(--display); font-size: clamp(48px, 7vw, 96px);
  letter-spacing: 0.06em; line-height: 1;
  opacity: 0; animation: fadeUp 0.6s 0.4s forwards;
}
.s-phase .phase-sub {
  font-family: var(--cond); font-size: clamp(14px, 2vw, 18px);
  font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); margin-top: 16px; max-width: 700px;
  opacity: 0; animation: fadeUp 0.5s 0.6s forwards;
}
.s-phase .phase-time-badge {
  margin-top: 28px; font-family: var(--mono); font-size: 11px;
  color: var(--amber); letter-spacing: 0.1em;
  opacity: 0; animation: fadeUp 0.5s 0.8s forwards;
}
.phase-divider {
  width: 0; height: 1px; margin: 20px auto;
  animation: expandW 0.6s 0.5s forwards;
}

/* ── SITUATION SLIDE ── */
.s-situation {
  padding: 80px 100px; flex-direction: column; align-items: flex-start;
  max-width: 1200px; margin: 0 auto;
}
.s-situation .sit-eyebrow {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 20px;
  opacity: 0; animation: fadeUp 0.4s 0.1s forwards;
}
.s-situation .sit-title {
  font-family: var(--cond); font-size: clamp(28px, 4vw, 48px);
  font-weight: 700; letter-spacing: 0.04em; line-height: 1.1;
  margin-bottom: 28px;
  opacity: 0; animation: fadeUp 0.5s 0.3s forwards;
}
.s-situation .sit-body {
  font-family: var(--body); font-size: clamp(14px, 1.6vw, 18px);
  font-weight: 300; line-height: 1.75; color: rgba(240,244,255,0.85);
  max-width: 900px; border-left: 2px solid var(--color, var(--indopacom));
  padding-left: 24px;
  opacity: 0; animation: fadeUp 0.6s 0.5s forwards;
}
.sit-timestamp {
  font-family: var(--mono); font-size: 10px; color: var(--amber);
  margin-bottom: 16px; letter-spacing: 0.1em;
  opacity: 0; animation: fadeUp 0.4s 0.2s forwards;
}

/* ── INJECT SLIDE ── */
.s-inject {
  padding: 80px 100px; flex-direction: column; align-items: flex-start;
  max-width: 1200px; margin: 0 auto; width: 100%;
}
.inject-label-top {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; margin-bottom: 16px;
  opacity: 0; animation: fadeUp 0.3s 0.1s forwards;
}
.inject-id {
  font-family: var(--display); font-size: clamp(36px, 5vw, 64px);
  letter-spacing: 0.06em; margin-bottom: 20px;
  opacity: 0; animation: fadeUp 0.5s 0.2s forwards;
}
.inject-source {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; margin-bottom: 24px; padding: 4px 10px;
  border-left: 2px solid var(--color, var(--orange));
  color: var(--color, var(--orange));
  opacity: 0; animation: fadeUp 0.4s 0.3s forwards;
}
.inject-body {
  font-size: clamp(15px, 1.7vw, 20px); font-weight: 300; line-height: 1.7;
  color: rgba(240,244,255,0.9); max-width: 900px;
  opacity: 0; animation: fadeUp 0.6s 0.4s forwards;
}
.inject-ils2-tag {
  display: inline-block; margin-top: 20px; padding: 4px 12px;
  background: rgba(160,124,244,0.15); border: 0.5px solid rgba(160,124,244,0.4);
  border-radius: 2px; font-family: var(--mono); font-size: 9px;
  color: var(--indopacom); letter-spacing: 0.1em; text-transform: uppercase;
  opacity: 0; animation: fadeUp 0.4s 0.7s forwards;
}

/* ── QUESTION SLIDE ── */
.s-question {
  padding: 80px 100px; flex-direction: column; align-items: flex-start;
  max-width: 1200px; margin: 0 auto; width: 100%;
}
.q-eyebrow {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 20px;
  opacity: 0; animation: fadeUp 0.3s 0.1s forwards;
}
.q-num {
  font-family: var(--display); font-size: clamp(80px, 12vw, 160px);
  color: rgba(255,255,255,0.04); line-height: 1;
  position: absolute; right: 80px; top: 50%; transform: translateY(-60%);
  pointer-events: none; letter-spacing: -0.02em;
}
.q-text {
  font-family: var(--cond); font-size: clamp(22px, 3vw, 38px);
  font-weight: 400; line-height: 1.4; max-width: 820px;
  opacity: 0; animation: fadeUp 0.6s 0.3s forwards;
}
.q-text em { color: var(--indopacom); font-style: normal; }
.q-discuss {
  margin-top: 28px; font-family: var(--mono); font-size: 10px;
  color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
  opacity: 0; animation: fadeUp 0.4s 0.7s forwards;
  display: flex; align-items: center; gap: 10px;
}
.q-discuss::before { content:''; width: 30px; height: 1px; background: var(--muted); }

/* ── STAT / CALLOUT SLIDE ── */
.s-stat {
  flex-direction: column; text-align: center; padding: 60px;
  position: relative;
}
.stat-value {
  font-family: var(--display); font-size: clamp(100px, 18vw, 220px);
  letter-spacing: -0.02em; line-height: 0.9;
  opacity: 0; animation: fadeUp 0.5s 0.2s forwards;
}
.stat-label {
  font-family: var(--cond); font-size: clamp(18px, 2.5vw, 28px);
  font-weight: 300; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--muted); margin-top: 16px;
  opacity: 0; animation: fadeUp 0.5s 0.5s forwards;
}
.stat-sub {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  margin-top: 10px; letter-spacing: 0.08em;
  opacity: 0; animation: fadeUp 0.4s 0.7s forwards;
}

/* ── ILS2 STRATEGIC SLIDE ── */
.s-ils2 {
  padding: 80px 100px; flex-direction: column; align-items: flex-start;
  max-width: 1200px; margin: 0 auto; width: 100%;
}
.ils2-header {
  display: flex; align-items: center; gap: 16px; margin-bottom: 28px;
  opacity: 0; animation: fadeUp 0.5s 0.2s forwards;
}
.ils2-badge {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; padding: 4px 10px;
  background: rgba(160,124,244,0.15); border: 0.5px solid rgba(160,124,244,0.4);
  color: var(--indopacom); border-radius: 2px;
}
.ils2-title {
  font-family: var(--display); font-size: clamp(40px, 5.5vw, 72px);
  letter-spacing: 0.06em; color: var(--indopacom);
  opacity: 0; animation: fadeUp 0.6s 0.3s forwards;
  line-height: 1;
}
.ils2-task-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  margin-top: 24px; width: 100%;
  opacity: 0; animation: fadeUp 0.6s 0.5s forwards;
}
.ils2-task {
  padding: 14px 16px; background: rgba(160,124,244,0.06);
  border: 0.5px solid rgba(160,124,244,0.2); border-radius: 4px;
}
.task-num { font-family: var(--mono); font-size: 8px; color: var(--indopacom); letter-spacing: 0.1em; margin-bottom: 5px; }
.task-name { font-family: var(--cond); font-size: 14px; font-weight: 600; color: var(--white); }
.task-desc { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

/* ── CLOSING SLIDE ── */
.s-close {
  flex-direction: column; text-align: center; padding: 60px; position: relative;
}
.s-close h2 {
  font-family: var(--display); font-size: clamp(60px, 9vw, 120px);
  letter-spacing: 0.06em; line-height: 1;
  opacity: 0; animation: fadeUp 0.6s 0.3s forwards;
}
.s-close .close-sub {
  font-family: var(--cond); font-size: clamp(14px, 2vw, 20px);
  font-weight: 300; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--muted); margin-top: 16px;
  opacity: 0; animation: fadeUp 0.5s 0.6s forwards;
}
.close-divider {
  width: 0; height: 1px; background: var(--indopacom); margin: 24px auto;
  animation: expandW 0.8s 0.9s forwards;
  box-shadow: 0 0 12px var(--indopacom);
}
.s-close .close-doc {
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  letter-spacing: 0.12em;
  opacity: 0; animation: fadeUp 0.4s 1.2s forwards;
}

/* ── KEYFRAMES ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes expandW {
  from { width: 0; }
  to   { width: 200px; }
}
@keyframes blink {
  0%,100% { opacity: 1; } 50% { opacity: 0; }
}
@keyframes glitch {
  0%   { transform: translate(0); }
  20%  { transform: translate(-2px, 1px); }
  40%  { transform: translate(2px, -1px); }
  60%  { transform: translate(-1px, 2px); }
  80%  { transform: translate(1px, -2px); }
  100% { transform: translate(0); }
}
@keyframes pulse-glow {
  0%,100% { box-shadow: 0 0 8px var(--indopacom); }
  50%      { box-shadow: 0 0 24px var(--indopacom), 0 0 48px rgba(160,124,244,0.3); }
}

/* ── FLASH TRANSITION ── */
#flash {
  position: fixed; inset: 0; background: var(--white);
  opacity: 0; pointer-events: none; z-index: 8998;
  transition: opacity 0.08s;
}
#flash.on { opacity: 0.04; }

/* ── AUTO-PLAY INDICATOR ── */
#autoplay-bar {
  position: fixed; bottom: 0; left: 0; height: 2px;
  background: rgba(160,124,244,0.3); z-index: 9001;
  display: none;
}
#autoplay-fill {
  height: 100%; background: var(--indopacom);
  transition: width linear;
}
</style>
</head>

<div id="autoplay-bar"><div id="autoplay-fill"></div></div>

function renderSlide(s, idx) {
  let html = '';
  switch(s.type) {
    case 'title':     html = html_title(); break;
    case 'stat':      html = html_stat(s); break;
    case 'phase':     html = html_phase(s); break;
    case 'situation': html = html_situation(s); break;
    case 'inject':    html = html_inject(s); break;
    case 'question':  html = html_question(s); break;
    case 'ils2':      html = html_ils2(); break;
    case 'close':     html = html_close(); break;
  }
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  const slide = wrapper.firstElementChild;
  slide.id = `slide-${idx}`;
  return slide;
}

// Build all slides
SLIDES.forEach((s, i) => {
  stage.appendChild(renderSlide(s, i));
});

// ── NAVIGATION ──────────────────────────────────────────────────────────────
let current = 0;
const total = SLIDES.length;
let autoplay = false;
let autoTimer = null;
let autoFill = null;
const AUTOPLAY_DURATION = 8000;

function showSlide(n, dir = 1) {
  const prev = document.getElementById(`slide-${current}`);
  current = Math.max(0, Math.min(n, total - 1));
  const next = document.getElementById(`slide-${current}`);

  // Flash
  const flash = document.getElementById('flash');
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 80);

  if (prev) prev.classList.remove('active');
  next.classList.remove('active');
  // Force reflow for re-animation
  void next.offsetWidth;
  next.classList.add('active');

  // Progress bar
  document.getElementById('progress').style.width = `${((current+1)/total)*100}%`;
  // Counter
  document.getElementById('slide-counter').textContent = `${current+1} / ${total}`;

  // Autoplay bar
  if (autoplay) resetAutoFill();
}

function resetAutoFill() {
  const bar = document.getElementById('autoplay-bar');
  const fill = document.getElementById('autoplay-fill');
  bar.style.display = 'block';
  fill.style.transition = 'none';
  fill.style.width = '0%';
  void fill.offsetWidth;
  fill.style.transition = `width ${AUTOPLAY_DURATION}ms linear`;
  fill.style.width = '100%';
}

function startAutoplay() {
  autoplay = true;
  resetAutoFill();
  autoTimer = setInterval(() => {
    if (current < total - 1) showSlide(current + 1);
    else stopAutoplay();
  }, AUTOPLAY_DURATION);
}

function stopAutoplay() {
  autoplay = false;
  clearInterval(autoTimer);
  document.getElementById('autoplay-bar').style.display = 'none';
  document.getElementById('autoplay-fill').style.width = '0%';
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    stopAutoplay(); showSlide(current + 1, 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    stopAutoplay(); showSlide(current - 1, -1);
  } else if (e.key === ' ') {
    e.preventDefault();
    autoplay ? stopAutoplay() : startAutoplay();
  } else if (e.key === 'f' || e.key === 'F') {
    document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
  } else if (e.key === 'Home') {
    stopAutoplay(); showSlide(0);
  } else if (e.key === 'End') {
    stopAutoplay(); showSlide(total - 1);
  }
});

// Click to advance
stage.addEventListener('click', e => {
  if (e.clientX > window.innerWidth / 2) {
    stopAutoplay(); showSlide(current + 1, 1);
  } else {
    stopAutoplay(); showSlide(current - 1, -1);
  }
});

// Cursor
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// Init
showSlide(0);
</script>
