<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCC Logistics Intelligence — LOGCAP V & EAGLE II Global</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #111827;
  --surface: #1a2235;
  --elevated: #222d45;
  --border: rgba(255,255,255,0.10);
  --border-hi: rgba(255,255,255,0.22);
  --text: #e8edf8;
  --muted: #8892b0;
  --dim: #3a4560;
  --orange: #ff6b35;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --northcom: #4d82ff;
  --eucom:    #3ec98a;
  --indopacom:#a07cf4;
  --centcom:  #f0a830;
  --africom:  #f05a5a;
  --southcom: #2eccd6;
}
html { font-family: var(--sans); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
body { overflow-x: hidden; }

/* ── NAV ── */
.top-nav {
  position: sticky; top: 0; z-index: 1000;
  background: rgba(18,28,48,0.97); backdrop-filter: blur(10px);
  border-bottom: 0.5px solid var(--border-hi);
  padding: 0 20px;
  display: flex; align-items: center; gap: 0; overflow-x: auto;
}
.nav-brand { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 14px 16px 14px 0; border-right: 0.5px solid var(--border); margin-right: 12px; white-space: nowrap; flex-shrink: 0; }
.nav-link { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 14px 14px; cursor: pointer; transition: color 0.15s; border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0; text-decoration: none; display: block; }
.nav-link:hover { color: var(--text); }
.nav-link.active { color: var(--text); }

/* ── SECTION ── */
.gcc-section { min-height: 100vh; display: flex; flex-direction: row; border-bottom: 1px solid var(--border); align-items: flex-start; }
@media (max-width: 899px) { .gcc-section { flex-direction: column; align-items: stretch; } }

/* ── MAP ── */
.gcc-map { flex: 1; position: relative; background: #0e1525; min-height: 100vh; align-self: stretch; }
@media (max-width: 899px) { .gcc-map { min-height: 55vh; } }
.gcc-map svg { width: 100%; height: 100%; display: block; }

.gcc-label {
  position: absolute; top: 14px; left: 14px;
  background: rgba(14,21,37,0.92); backdrop-filter: blur(6px);
  border-radius: 6px; padding: 8px 12px;
  border-left: 3px solid var(--gcc-color, #4d82ff);
}
.gcc-label-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.gcc-label-name { font-size: 18px; font-weight: 500; color: var(--gcc-color, #4d82ff); }
.gcc-label-prime { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Map legend chip */
.map-legend {
  position: absolute; bottom: 14px; left: 14px;
  background: rgba(14,21,37,0.90); backdrop-filter: blur(6px);
  border: 0.5px solid var(--border-hi); border-radius: 6px; padding: 8px 12px;
  display: flex; flex-direction: column; gap: 5px;
}
.ml-item { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
.ml-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ml-sq { width: 8px; height: 8px; border-radius: 1px; border: 1.5px dashed var(--orange); flex-shrink: 0; }

/* ── INFO PANEL ── */
.gcc-info { width: 340px; flex-shrink: 0; height: 100vh; background: var(--surface); border-left: 0.5px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; position: sticky; top: 47px; align-self: flex-start; max-height: calc(100vh - 47px); }
@media (max-width: 899px) { .gcc-info { width: 100%; height: auto; max-height: none; border-left: none; border-top: 0.5px solid var(--border); position: static; align-self: auto; } }

.gcc-info-head { padding: 14px 16px 10px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.gcc-info-title { font-size: 14px; font-weight: 500; }
.gcc-info-sub { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 3px; }

.gcc-stats { display: grid; grid-template-columns: repeat(3,1fr); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.gs { padding: 8px 12px; border-right: 0.5px solid var(--border); }
.gs:last-child { border-right: none; }
.gs-v { font-size: 16px; font-weight: 300; }
.gs-l { font-family: var(--mono); font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 1px; }

.gcc-inst-list { flex: 1; overflow-y: auto; }
.gcc-inst-list::-webkit-scrollbar { width: 2px; }
.gcc-inst-list::-webkit-scrollbar-thumb { background: var(--dim); }

.inst-row { padding: 10px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.1s; }
.inst-row:hover { background: var(--elevated); }
.inst-row.sel { background: var(--elevated); border-left: 2px solid var(--gcc-color, #4d82ff); padding-left: 12px; }
.ir-name { font-size: 12px; font-weight: 500; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.ir-meta { font-family: var(--mono); font-size: 9px; color: var(--muted); }
.ir-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
.tag { display: inline-flex; align-items: center; gap: 3px; font-family: var(--mono); font-size: 8px; font-weight: 500; padding: 2px 6px; border-radius: 99px; }
.tag-dot { width: 4px; height: 4px; border-radius: 50%; }
.recomp-pill { font-family: var(--mono); font-size: 8px; font-weight: 500; padding: 1px 6px; border-radius: 99px; background: rgba(255,107,53,0.18); color: var(--orange); border: 0.5px solid rgba(255,107,53,0.4); white-space: nowrap; }

.gcc-detail { padding: 14px; flex-shrink: 0; border-top: 0.5px solid var(--border); display: none; }
.gcc-detail.show { display: block; }
.gd-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.gd-meta { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-bottom: 10px; }
.gd-recomp { margin-bottom: 10px; padding: 8px 10px; background: rgba(255,107,53,0.15); border: 0.5px solid rgba(255,107,53,0.35); border-radius: 5px; }
.gd-recomp-title { font-family: var(--mono); font-size: 8px; color: var(--orange); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.gd-recomp-body { font-size: 10px; color: var(--text); line-height: 1.5; font-family: var(--mono); }
.gd-sec-h { font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); border-bottom: 0.5px solid var(--border); padding-bottom: 3px; margin-bottom: 6px; }
.gd-row { padding: 6px 0; border-bottom: 0.5px solid var(--border); }
.gd-row:last-child { border-bottom: none; }
.gd-cname { font-size: 11px; font-weight: 500; }
.gd-role { font-size: 10px; color: var(--muted); font-family: var(--mono); line-height: 1.4; margin-top: 2px; }
.gd-close { float: right; background: none; border: 0.5px solid var(--border-hi); color: var(--muted); font-size: 11px; width: 20px; height: 20px; border-radius: 3px; cursor: pointer; }

/* ── DOT ANIMATIONS ── */
/* Active site — intense triple pulse */
@keyframes pa { 0%{r:7;opacity:1} 60%{opacity:.6} 100%{r:40;opacity:0} }
@keyframes pb { 0%{r:7;opacity:.7} 60%{opacity:.4} 100%{r:28;opacity:0} }
@keyframes pc { 0%{r:7;opacity:.4} 100%{r:18;opacity:0} }
@keyframes core-pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
.ring1 { fill:none; stroke-width:2; animation:pa 2.2s ease-out infinite; }
.ring2 { fill:none; stroke-width:1.5; animation:pb 2.2s ease-out infinite .55s; }
.ring3 { fill:none; stroke-width:1; animation:pc 2.2s ease-out infinite 1.1s; }
.core  { animation:core-pulse 2.2s ease-in-out infinite; }

/* Recompete — intense dashed orange triple pulse */
@keyframes rp  { 0%{r:8;opacity:1} 60%{opacity:.6} 100%{r:44;opacity:0} }
@keyframes rp2 { 0%{r:8;opacity:.6} 100%{r:30;opacity:0} }
.ring-recomp  { fill:none; stroke-width:2; stroke-dasharray:5,3; animation:rp  2.8s ease-out infinite; }
.ring-recomp2 { fill:none; stroke-width:1.5; stroke-dasharray:3,4; animation:rp2 2.8s ease-out infinite .7s; }

.core { transition:r .15s; }
.idot:hover .core { r:8; }
.idot.sel .core { r:9; }
.ilabel { font-family:'IBM Plex Mono',monospace; font-size:14px; pointer-events:none; }

/* Tooltip */
.gtip { position:fixed; background:var(--elevated); border:0.5px solid var(--border-hi); border-radius:7px; padding:9px 11px; pointer-events:none; opacity:0; transition:opacity .12s; max-width:360px; z-index:500; box-shadow:0 8px 30px rgba(0,0,0,.8); font-size:11px; }
.gtip.show { opacity:1; }
.gt-name { font-size:12px; font-weight:500; margin-bottom:2px; }
.gt-sub { font-family:var(--mono); font-size:9px; color:var(--muted); margin-bottom:5px; }
.gt-c { display:flex; align-items:center; gap:5px; padding:1px 0; }
.gt-cd { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.gt-recomp { margin-top:6px; padding:4px 7px; background:rgba(255,107,53,0.15); border:0.5px solid rgba(255,107,53,0.35); border-radius:4px; font-family:var(--mono); font-size:9px; color:var(--orange); }

.map-load { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:var(--mono); font-size:14px; color:var(--muted); }

/* Ceiling badges */
.ceil-badge { display:inline-block; font-family:var(--mono); font-size:9px; font-weight:500; padding:2px 7px; border-radius:3px; background:rgba(255,255,255,0.07); color:var(--text); white-space:nowrap; }
.ceil-badge.known { background:rgba(77,130,255,0.15); color:#7ab3ff; }
.ceil-badge.large { background:rgba(240,168,48,0.15); color:#f0c060; }
.ceil-badge.recomp { background:rgba(255,107,53,0.15); color:#ff8c60; }

/* GCC total ceiling strip */
.gcc-ceiling-strip { padding:8px 14px; background:rgba(0,0,0,0.15); border-bottom:0.5px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }
.gcs-label { font-family:var(--mono); font-size:8px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); }
.gcs-value { font-family:var(--mono); font-size:13px; font-weight:500; }

/* Global legend footer */
.global-legend { padding:16px 20px; background:var(--surface); border-top:0.5px solid var(--border); display:flex; flex-wrap:wrap; gap:16px; align-items:center; }
.gl-item { display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:9px; color:var(--muted); }
.gl-dot { width:8px; height:8px; border-radius:50%; }
.gl-sq { width:8px; height:8px; border-radius:1px; border:1.5px dashed var(--orange); }
</style>

    ? `<div class="gt-recomp">⚠ Recompete — incumbent: ${inst.recompete.incumbent} · expires ${inst.recompete.expires}</div>` : "";
  tipEl.innerHTML = `
    <div class="gt-name" style="color:${inst.recompete ? '#ff6b35' : gccColor}">${inst.name}</div>
    <div class="gt-sub">${inst.country}</div>
    ${inst.contractors.map(c=>`
      <div class="gt-c"><div class="gt-cd" style="background:${c.color}"></div>
        <div style="flex:1;min-width:0">
          <div><span style="font-weight:500">${c.name.split("(")[0].trim()}</span> <span style="color:var(--muted)">· ${c.vehicle.split("—")[0].trim()}</span>${c.ceiling?`<span style="margin-left:6px;font-family:var(--mono);font-size:9px;font-weight:500;color:${c.ceiling.startsWith("$")&&!c.ceiling.includes("TO")&&!c.ceiling.includes("task")&&!c.ceiling.includes("Task")?"#7ab3ff":"var(--muted)"}">${c.ceiling}</span>`:""}</div>
          ${c.scope?`<div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:3px;line-height:1.45">${c.scope}</div>`:""}
        </div>
      </div>`).join("")}
    ${recompBanner}`;
  let lx=evt.clientX+14, ly=evt.clientY-16;
  if(lx+270>window.innerWidth) lx=evt.clientX-275;
  if(ly+140>window.innerHeight) ly=window.innerHeight-145;
  tipEl.style.left=lx+"px"; tipEl.style.top=ly+"px";
  tipEl.classList.add("show");
}
function hideTip() { tipEl.classList.remove("show"); }

// ── BUILD SECTION ─────────────────────────────────────────────────────────────
function buildSection(gcc, worldTopo, usTopo) {
  const section = document.createElement("div");
  section.className = "gcc-section"; section.id = gcc.id;

  // Map panel
  const mapDiv = document.createElement("div");
  mapDiv.className = "gcc-map";
  mapDiv.style.setProperty("--gcc-color", gcc.color);

  const svgEl = d3.create("svg");
  mapDiv.appendChild(svgEl.node());

  const loadDiv = document.createElement("div");
  loadDiv.className = "map-load"; loadDiv.textContent = "Rendering…";
  mapDiv.appendChild(loadDiv);

  const labelDiv = document.createElement("div");
  labelDiv.className = "gcc-label";
  labelDiv.style.setProperty("--gcc-color", gcc.color);
  labelDiv.innerHTML = `
    <div class="gcc-label-eyebrow">Combatant Command</div>
    <div class="gcc-label-name">${gcc.short}</div>
    <div class="gcc-label-prime">${gcc.prime.split("—")[0].trim()}</div>`;
  mapDiv.appendChild(labelDiv);

  const mapLeg = document.createElement("div");
  mapLeg.className = "map-legend";
  mapLeg.innerHTML = `
    <div class="ml-item"><div class="ml-dot" style="background:${gcc.color}"></div>Active contractor site</div>
    <div class="ml-item"><div class="ml-sq"></div>Recompete / open solicitation / unknown incumbent</div>`;
  mapDiv.appendChild(mapLeg);

  // Info panel
  const infoDiv = document.createElement("div");
  infoDiv.className = "gcc-info";
  infoDiv.style.setProperty("--gcc-color", gcc.color);

  const recompCount = gcc.installations.filter(i=>i.recompete).length;
  infoDiv.innerHTML = `
    <div class="gcc-info-head">
      <div class="gcc-info-title" style="color:${gcc.color}">${gcc.name}</div>
      <div class="gcc-info-sub">${gcc.hq} · ${gcc.prime.split("—")[0].trim()}</div>
    </div>
    <div class="gcc-stats">
      <div class="gs"><div class="gs-v" style="color:${gcc.color}">${gcc.stats.sites}</div><div class="gs-l">Sites</div></div>
      <div class="gs"><div class="gs-v" style="color:${gcc.color}">${gcc.stats.contractors}</div><div class="gs-l">Firms</div></div>
      <div class="gs"><div class="gs-v" style="color:${recompCount>0?'var(--orange)':gcc.color}">${recompCount}</div><div class="gs-l">Recompetes</div></div>
    </div>
    <div class="gcc-ceiling-strip">
      <span class="gcs-label">Known contract value</span>
      <span class="gcs-value" style="color:${gcc.color}">${(()=>{
        const ceilings = gcc.installations.flatMap(i=>i.contractors).map(c=>c.ceiling||"").filter(v=>v.startsWith("$"));
        const total = ceilings.reduce((s,v)=>{
          const n = parseFloat(v.replace(/[$BMbm,]/g,''));
          return s + (v.toLowerCase().includes('b') ? n*1000 : n);
        },0);
        if(total===0) return "Classified / TOs";
        return total >= 1000 ? "$"+(total/1000).toFixed(1)+"B+" : "$"+Math.round(total)+"M+";
      })()}</span>
    </div>
    <div class="gcc-inst-list" id="list-${gcc.id}"></div>
    <div class="gcc-detail" id="detail-${gcc.id}"></div>`;

  section.appendChild(mapDiv);
  section.appendChild(infoDiv);

  // Sidebar list
  const listEl = infoDiv.querySelector(`#list-${gcc.id}`);
  gcc.installations.forEach(inst => {
    const row = document.createElement("div");
    row.className = "inst-row"; row.dataset.id = inst.name;
    const tags = inst.contractors.map(c=>{
      const isKnown = c.ceiling && c.ceiling.startsWith("$");
      return `<span class="tag" style="background:${c.color}22;color:${c.color}"><span class="tag-dot" style="background:${c.color}"></span>${c.name.split(" ")[0]}${isKnown?` <span style="opacity:0.7">${c.ceiling}</span>`:""}</span>`;
    }).join("");
    const pill = inst.recompete ? `<span class="recomp-pill">⚠ ${inst.recompete.expires}</span>` : "";
    row.innerHTML = `
      <div class="ir-name" style="color:${inst.recompete?'var(--orange)':gcc.color}">${inst.name} ${pill}</div>
      <div class="ir-meta">${inst.country}</div>
      <div class="ir-tags">${tags}</div>`;
    row.addEventListener("click", ()=>selectInst(gcc, inst, row, infoDiv));
    listEl.appendChild(row);
  });

  // Render map after DOM paint
  requestAnimationFrame(()=>{
    const W = mapDiv.clientWidth || 700;
    const H = mapDiv.clientHeight || 500;
    svgEl.attr("viewBox",`0 0 ${W} ${H}`).attr("width",W).attr("height",H);

    let proj;
    if (gcc.mapType === "usa" && usTopo) {
      proj = d3.geoAlbersUsa().scale(W*1.22).translate([W/2, H/2]);
      const pathFn = d3.geoPath().projection(proj);
      const states = topojson.feature(usTopo, usTopo.objects.states);
      const mesh = topojson.mesh(usTopo, usTopo.objects.states, (a,b)=>a!==b);
      svgEl.append("g").selectAll("path").data(states.features).join("path")
        .attr("fill","#1c2e48").attr("stroke","#243550").attr("stroke-width",0.5).attr("d",pathFn);
      svgEl.append("path").datum(mesh).attr("fill","none").attr("stroke","#2a3d5e").attr("stroke-width",0.4).attr("d",pathFn);
    } else if (worldTopo) {
      // Zoom center and scale per GCC
      const gccZoom = {
        eucom:     { center:[20, 49],   scale: W/1.5  },
        indopacom: { center:[148, 18],  scale: W/2.4  },
        centcom:   { center:[47, 28],   scale: W/1.3  },
        africom:   { center:[33, 6],    scale: W/1.7  },
        southcom:  { center:[-82, 14],  scale: W/1.4  },
      };
      const zoom = gccZoom[gcc.id] || { center:[0,20], scale: W/6.3 };
      proj = d3.geoMercator().center(zoom.center).scale(zoom.scale).translate([W/2, H/2]);
      const pathFn = d3.geoPath().projection(proj);
      const countries = topojson.feature(worldTopo, worldTopo.objects.countries);
      svgEl.append("g").selectAll("path").data(countries.features).join("path")
        .attr("fill","#1c2e48").attr("stroke","#243550").attr("stroke-width",0.4).attr("d",pathFn);
    }

    loadDiv.style.display = "none";
    const dotsG = svgEl.append("g");

    gcc.installations.forEach(inst => {
      if (!proj) return;
      const pt = proj([inst.lng, inst.lat]);
      if (!pt) return;
      const [x,y] = pt;
      const isRecomp = !!inst.recompete;
      const dotColor = isRecomp ? "#ff6b35" : gcc.color;
      const d1 = `${(Math.random()*2.5).toFixed(2)}s`;
      const d2 = `${(Math.random()*2.5+0.8).toFixed(2)}s`;

      const g = dotsG.append("g").attr("class","idot").attr("data-id",inst.name).style("cursor","pointer");

      if (isRecomp) {
        // Double dashed orange recompete rings
        g.append("circle").attr("class","ring-recomp").attr("cx",x).attr("cy",y).attr("r",8)
          .attr("stroke","#ff6b35").style("animation-delay",d1);
        g.append("circle").attr("class","ring-recomp2").attr("cx",x).attr("cy",y).attr("r",8)
          .attr("stroke","#ff6b35").style("animation-delay",d2);
        // Diamond marker for recompete
        const s = 8;
        g.append("polygon").attr("points",`${x},${y-s} ${x+s},${y} ${x},${y+s} ${x-s},${y}`)
          .attr("fill","#ff6b35").attr("opacity",1)
          .attr("filter","drop-shadow(0 0 8px #ff6b35cc)");
      } else {
        g.append("circle").attr("class","ring1").attr("cx",x).attr("cy",y).attr("r",7)
          .attr("stroke",dotColor).style("animation-delay",d1);
        g.append("circle").attr("class","ring2").attr("cx",x).attr("cy",y).attr("r",7)
          .attr("stroke",dotColor).style("animation-delay",d2);
        g.append("circle").attr("class","ring3").attr("cx",x).attr("cy",y).attr("r",7)
          .attr("stroke",dotColor).style("animation-delay",`${(Math.random()*1.5+0.3).toFixed(2)}s`);
        g.append("circle").attr("class","core").attr("cx",x).attr("cy",y).attr("r",6)
          .attr("fill",dotColor).attr("filter",`drop-shadow(0 0 8px ${dotColor}cc)`);
      }

      g.append("text").attr("class","ilabel").attr("x",x+9).attr("y",y+3.5)
        .attr("fill","#6a7a99").text(inst.name.split("/")[0].trim().replace("Fort ","Ft "));

      g.on("click",()=>{
        const row = listEl.querySelector(`[data-id="${inst.name}"]`);
        listEl.querySelectorAll(".inst-row").forEach(r=>r.classList.remove("sel"));
        if(row){ row.classList.add("sel"); row.scrollIntoView({behavior:"smooth",block:"nearest"}); }
        selectInst(gcc, inst, row, infoDiv);
      });
      g.on("mouseenter",(e)=>showTip(e,inst,gcc.color));
      g.on("mouseleave",hideTip);
    });
  });

  return section;
}

function selectInst(gcc, inst, rowEl, infoDiv) {
  infoDiv.querySelectorAll(".inst-row").forEach(r=>r.classList.remove("sel"));
  if(rowEl) rowEl.classList.add("sel");
  const detailEl = infoDiv.querySelector(`#detail-${gcc.id}`);
  detailEl.classList.add("show");

  const recompBanner = inst.recompete ? `
    <div class="gd-recomp">
      <div class="gd-recomp-title">⚠ Recompete Opportunity</div>
      <div class="gd-recomp-body"><strong>Incumbent:</strong> ${inst.recompete.incumbent}<br><strong>Ceiling:</strong> ${inst.recompete.ceiling} · Expires: ${inst.recompete.expires}<br><br>${inst.recompete.notes}</div>
    </div>` : "";

  detailEl.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
      <div>
        <div class="gd-name" style="color:${inst.recompete?'var(--orange)':gcc.color}">${inst.name}</div>
        <div class="gd-meta">${inst.country}</div>
      </div>
      <button class="gd-close" onclick="this.closest('.gcc-detail').classList.remove('show');this.closest('.gcc-info').querySelectorAll('.inst-row').forEach(r=>r.classList.remove('sel'))">✕</button>
    </div>
    ${recompBanner}
    <div class="gd-sec-h">Contractors & Vehicles</div>
    ${inst.contractors.map(c=>{
      const isLarge = c.ceiling && c.ceiling.startsWith("$") && !c.ceiling.includes("TO") && !c.ceiling.includes("task") && !c.ceiling.includes("Task") && !c.ceiling.includes("od");
      return `<div class="gd-row">
        <div style="display:flex;align-items:start;justify-content:space-between;gap:8px;margin-bottom:3px">
          <div class="gd-cname" style="color:${c.color}">${c.name}</div>
          ${c.ceiling ? `<span style="font-family:var(--mono);font-size:11px;font-weight:500;color:${isLarge?"#7ab3ff":"var(--muted)"};white-space:nowrap;flex-shrink:0">${c.ceiling}</span>` : ""}
        </div>
        <div class="gd-role" style="margin-bottom:${c.scope?'5px':'0'}">${c.vehicle}</div>
        ${c.scope ? `<div style="font-size:10px;color:var(--text);line-height:1.55;padding:6px 8px;background:rgba(255,255,255,0.04);border-radius:4px;border-left:2px solid ${c.color}40">${c.scope}</div>` : ""}
      </div>`;
    }).join("")}`;
  detailEl.scrollIntoView({behavior:"smooth",block:"nearest"});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
const sectionsEl = document.getElementById("sections");
Promise.all([
  d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json"),
  d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json")
]).then(([worldTopo, usTopo]) => {
  GCCS.forEach(gcc => sectionsEl.appendChild(buildSection(gcc, worldTopo, usTopo)));

  // Sticky nav highlight on scroll
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting) {
        document.querySelectorAll(".nav-link").forEach(l=>l.classList.remove("active"));
        const link = document.querySelector(`.nav-link[href="#${e.target.id}"]`);
        if(link) link.classList.add("active");
      }
    });
  }, { threshold: 0.25 });
  GCCS.forEach(gcc => { const el=document.getElementById(gcc.id); if(el) observer.observe(el); });

}).catch(()=>{
  sectionsEl.innerHTML=`<div style="padding:40px;font-family:monospace;color:#f05050">⚠ Map requires internet connection to load boundary data.</div>`;
});
</script>
</body>
</html>
